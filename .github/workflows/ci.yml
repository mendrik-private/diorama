name: Flatpak

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: flatpak-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build and test Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@bf5cafdfd97dcf5a89c7475bbc86a616e1f86acb # v6.7
        with:
          manifest-path: build-aux/io.github.mendrik.Diorama.Devel.json
          build-bundle: false
          run-tests: true
          upload-artifact: false
          cache-key: flatpak-ci-${{ hashFiles('Cargo.lock', 'build-aux/io.github.mendrik.Diorama.Devel.json', 'build-aux/cargo-sources.json') }}
